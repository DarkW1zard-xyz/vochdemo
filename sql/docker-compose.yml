services:
  postgres:
    image: postgres:16
    container_name: pc_search_postgres
    environment:
      POSTGRES_DB: pc_laptop_search
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: pc_search_redis
    ports:
      - "6379:6379"

  meilisearch:
    image: getmeili/meilisearch:v1.7
    container_name: pc_search_meili
    environment:
      MEILI_MASTER_KEY: masterKey
    ports:
      - "7700:7700"
    volumes:
      - meilidata:/meili_data

volumes:
  pgdata:
  meilidata:
