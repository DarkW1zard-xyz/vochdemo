<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PC & Laptop Search</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="container">
    <h1>PC & Laptop Search</h1>
    <p class="subtitle">Search by CPU, RAM, storage, GPU, screen, and price.</p>
  </header>

  <main class="container">
    <section class="search-panel">
      <div class="field">
        <label for="q">Search</label>
        <input id="q" type="search" placeholder="e.g., i7 16gb rtx 4060 1tb" autocomplete="off" list="suggestions" />
        <datalist id="suggestions"></datalist>
      </div>
      <div class="actions">
        <div class="inline">
          <label for="sort">Sort</label>
          <select id="sort">
            <option value="relevance">Relevance</option>
            <option value="newest">Newest</option>
            <option value="price_asc">Price: Low to High</option>
            <option value="price_desc">Price: High to Low</option>
            <option value="rating_desc">Rating</option>
            <option value="popularity_desc">Popularity</option>
          </select>
        </div>
        <button id="clear">Clear Filters</button>
        <span id="count">0 results</span>
      </div>
    </section>

    <section class="layout">
      <aside class="filters">
        <h2>Filters</h2>
        <div class="field">
          <label for="category">Category</label>
          <select id="category">
            <option value="">Any</option>
            <option value="electronics">Electronics</option>
            <option value="computers">Computers</option>
            <option value="gaming">Gaming</option>
            <option value="office">Office</option>
            <option value="accessories">Accessories</option>
          </select>
        </div>
        <div class="field">
          <label for="brand">Brand</label>
          <select id="brand">
            <option value="">Any</option>
            <option value="Apple">Apple</option>
            <option value="ASUS">ASUS</option>
            <option value="Acer">Acer</option>
            <option value="Dell">Dell</option>
            <option value="HP">HP</option>
            <option value="Intel">Intel</option>
            <option value="Lenovo">Lenovo</option>
            <option value="Microsoft">Microsoft</option>
            <option value="MSI">MSI</option>
          </select>
        </div>

        <div class="field">
          <label for="type">Type</label>
          <select id="type">
            <option value="">Any</option>
            <option value="laptop">Laptop</option>
            <option value="desktop">Desktop</option>
            <option value="mini-pc">Mini PC</option>
            <option value="all-in-one">All-in-one</option>
          </select>
        </div>

        <div class="field">
          <label for="availability">Availability</label>
          <select id="availability">
            <option value="">Any</option>
            <option value="in_stock">In stock</option>
            <option value="out_of_stock">Out of stock</option>
          </select>
        </div>

        <div class="field">
          <label for="cpu">CPU</label>
          <select id="cpu">
            <option value="">Any</option>
            <option value="intel">Intel</option>
            <option value="amd">AMD</option>
            <option value="apple">Apple</option>
          </select>
        </div>

        <div class="field">
          <label for="ram">RAM (GB)</label>
          <select id="ram">
            <option value="">Any</option>
            <option value="8">8+</option>
            <option value="16">16+</option>
            <option value="32">32+</option>
            <option value="64">64+</option>
          </select>
        </div>

        <div class="field">
          <label for="storage">Storage (GB)</label>
          <select id="storage">
            <option value="">Any</option>
            <option value="256">256+</option>
            <option value="512">512+</option>
            <option value="1024">1TB+</option>
            <option value="2048">2TB+</option>
          </select>
        </div>

        <div class="field">
          <label for="gpu">GPU</label>
          <select id="gpu">
            <option value="">Any</option>
            <option value="integrated">Integrated</option>
            <option value="nvidia">NVIDIA</option>
            <option value="amd">AMD</option>
            <option value="apple">Apple</option>
          </select>
        </div>

        <div class="field">
          <label for="screen">Screen (in)</label>
          <select id="screen">
            <option value="">Any</option>
            <option value="13">13+</option>
            <option value="14">14+</option>
            <option value="15">15+</option>
            <option value="16">16+</option>
          </select>
        </div>

        <div class="field">
          <label for="price">Max Price ($)</label>
          <input id="price" type="number" min="0" step="50" placeholder="e.g., 1200" />
        </div>

        <div class="field">
          <label for="minPrice">Min Price ($)</label>
          <input id="minPrice" type="number" min="0" step="50" placeholder="e.g., 400" />
        </div>
      </aside>

      <section>
        <div id="activeFilters" class="chips"></div>
        <div id="results" class="results"></div>
        <div id="empty" class="empty hidden">No matches. Try relaxing filters.</div>
        <div class="load-more">
          <button id="loadMore">Load more</button>
        </div>
      </section>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
